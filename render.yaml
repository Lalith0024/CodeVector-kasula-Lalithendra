services:
  - type: web
    name: codevector-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        value: "railway"
      - key: PORT
        value: "3001"
      - key: FRONTEND_URL
        value: "*"
